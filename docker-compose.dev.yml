services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mastroplan
      POSTGRES_PASSWORD: mastroplan
      POSTGRES_DB: mastroplan
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastroplan"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
